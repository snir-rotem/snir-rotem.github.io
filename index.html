<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="search-row">
        <div class="toggle-group" role="group" aria-label="Search type">
            <button type="button" class="toggle-btn" id="toggleMovies" data-mode="movie">Movies</button>
            <button type="button" class="toggle-btn" id="toggleSeries" data-mode="series">Series</button>
        </div>
        <div class="search-input-wrap">
            <input type="text" id="movieTitle" placeholder="e.g., Inception" aria-label="Search title" autocomplete="off">
            <div id="recentSearchesDropdown" class="recent-searches-dropdown" aria-hidden="true"></div>
        </div>
        <button type="button" onclick="searchAndDisplayResults()">Search</button>
    </div>

    <p id="resultsSummary" class="results-summary" aria-live="polite"></p>
    <ul id="resultsList"></ul>
    <div class="load-more-wrap">
        <button type="button" id="loadMoreBtn" class="load-more-btn">Load more</button>
    </div>

    <script src="script.js"></script>

</body>

</html>
